<!DOCTYPE html>
<html>
<head>
  <title>A message from your Miloguai</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: pink;
      font-family: Britannic, Georgia, serif;
      color: brown;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 15px;
    }

    p {
      font-size: 22px;
      margin-bottom: 25px;
    }

    button {
      background-color: #c49a6c;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 18px;
      border-radius: 20px;
      cursor: pointer;
      font-family: Britannic, Georgia, serif;
    }

    button:hover {
      background-color: #a67c52;
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 30px;
      animation: pop 2s infinite;
      opacity: 0.8;
    }

    .heart:nth-child(1) {
      top: 20%;
      left: 15%;
      animation-delay: 0s;
    }

    .heart:nth-child(2) {
      top: 70%;
      left: 20%;
      animation-delay: 0.5s;
    }

    .heart:nth-child(3) {
      top: 30%;
      right: 18%;
      animation-delay: 1s;
    }

    .heart:nth-child(4) {
      bottom: 20%;
      right: 15%;
      animation-delay: 1.5s;
    }

    @keyframes pop {
      0% {
        transform: scale(0.5);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
      100% {
        transform: scale(0.5);
        opacity: 0.3;
      }
    }
  </style>
</head>

<body>
  <div class="heart">♥</div>
  <div class="heart">♥</div>
  <div class="heart">♥</div>
  <div class="heart">♥</div>

  <div class="container">
    <h1>A message from your Miloguai</h1>

    <p id="message">Click the buttom baby.</p>

    <button onclick="changeText()">click me</button>
  </div>

  <script>
    function changeText() {
      document.getElementById("message").innerText = "I Love You XW";
    }
  </script>
</body>
</html>
